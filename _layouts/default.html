<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {% include head.html %}
  <title>
    {%- if page.title -%}
      {{ page.title }} | {{ site.title }}
    {%- else -%}
      {{ site.title }}
    {%- endif -%}
  </title>
</head>
<body>

  {% include nav.html %}

  <main class="site-main" id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>

</body>
</html>
